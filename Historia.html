<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>historia</title>

    <script src="Bootstrap/js/bootstrap.bundle.min.js"></script>  
</head>
<style>
       
        .timeline-container{
            max-width:900px;
            margin:50px auto;
            padding:30px;
        }

        .timeline-title{
            text-align:center;
            font-weight:bold;
            margin-bottom:50px;
            letter-spacing:1px;
        }

        .timeline{
            position:relative;
        }

        /* Línea principal */
        .timeline::before{
            content:'';
            position:absolute;
            top:20px;
            left:5%;
            width:90%;
            height:3px;
            background: black;
        }

        .timeline-item{
            position:relative;
            text-align:center;
        }

        .circle{
            width:18px;
            height:18px;
            border-radius:50%;
            background: black;
            border:3px solid #5e2129;
            margin:0 auto 15px;
            position:relative;
            z-index:2;
        }

        .year{
            color: #5e2129;
            font-weight:bold;
            font-size:14px;
        }

        .description{
            font-size:13px;
            color:black;
            margin-top:5px;
        }
    </style>
<body>

<div id="navbar"></div>

<div class="container timeline-container">
    <h4 class="timeline-title">
        HISTORIA DE LOS INSTRUMENTOS
    </h4>

    <div class="row timeline">

        <div class="col timeline-item">
            <div class="circle"></div>
            <div class="year">3000 a.C.</div>
            <div class="description">Primeros<br>instrumentos</div>
        </div>

        <div class="col timeline-item">
            <div class="circle"></div>
            <div class="year">1500 a.C.</div>
            <div class="description">Instrumentos<br>egipcios</div>
        </div>

        <div class="col timeline-item">
            <div class="circle"></div>
            <div class="year">1100 d.C.</div>
            <div class="description">Primeros<br>violines</div>
        </div>

        <div class="col timeline-item">
            <div class="circle"></div>
            <div class="year">1700 d.C.</div>
            <div class="description">Piano<br>moderno</div>
        </div>

        <div class="col timeline-item">
            <div class="circle"></div>
            <div class="year">1900 d.C.</div>
            <div class="description">Instrumentos<br>electrónicos</div>
        </div>

    </div>
</div>

    <div id="footer"></div>

  <script src="componentes.js"></script>
  <script src="Bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
