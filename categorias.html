<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="Bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="CSS/Asset/CSS/estilos.css">
  <link rel="stylesheet" href="CSS/Asset/CSS/estilosInicio.css">
  <title>Categorías</title>
</head>
<body>

  <div id="navbar"></div>

  <header class="hero">
    <div class="container text-center">
      <h1>CATEGORÍAS</h1>
      <p>Explora los instrumentos agrupados por familias</p>
    </div>
  </header>

  <main>
     <section class="section-block">
  <div class="container">
    <div class="row g-4 justify-content-center">

      <div class="col-sm-6 col-lg-4">
        <div class="product-card">
          <div class="product-img">
            <img src="CSS/Asset/Cuerdas/arpa.png" alt="Arpa">
          </div>
          <div class="card-body">
            <h5 class="card-title">Cuerdas</h5>
            <a href="instrumento.html#Cuerdas" class="btn btn-gold btn-sm">Ver más</a>
          </div>
        </div>
      </div>

      <div class="col-sm-6 col-lg-4">
        <div class="product-card">
          <div class="product-img">
            <img src="CSS/Asset/percusion/xilofono.webp" alt="Piano">
          </div>
          <div class="card-body">
            <h5 class="card-title">Percusion</h5>
            <a href="instrumento.html#Percusion" class="btn btn-gold btn-sm">Ver más</a>
          </div>
        </div>
      </div>

      <div class="col-sm-6 col-lg-4">
        <div class="product-card">
          <div class="product-img">
            <img src="CSS/Asset/viento/saxofon.png" alt="Viento">
          </div>
          <div class="card-body">
            <h5 class="card-title">Viento</h5>
            <a href="instrumento.html#Viento" class="btn btn-gold btn-sm">Ver más</a>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>

    <section class="frase-final">
      <div class="container text-center">
        <h3>Cada categoría tiene un mundo que contar</h3>
        <p>Elige la tuya y comienza a explorar.</p>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="componentes.js"></script>
  <script src="Bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
